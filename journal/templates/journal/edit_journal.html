{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chỉnh sửa nhật ký công việc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        min-height: 100vh;
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 12px 16px;
        z-index: 1000;
        color: #fff;
      }

      .page-center {
        min-height: 100vh;
        padding-top: 90px;
      }

      .journal-card {
        border-radius: 16px;
      }

      .btn-save {
        min-width: 200px;
        font-size: 1.1rem;
      }
    </style>
  </head>

  <body>
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="d-flex justify-content-between align-items-center text-white">
        <div class="fw-semibold">
          <div>
            <i class="bi bi-person-circle me-1"></i>
            Xin chào, <strong>{{ name }}</strong>
          </div>
          <div>Địa điểm: {{ shift_location }}</div>
          <div>Ca trực: {{ shift_time }}</div>
        </div>

        <a
          href="{% url 'logout_user' %}"
          class="btn btn-outline-light btn-sm rounded-pill"
        >
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-sm-inline">Đăng xuất</span>
        </a>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="page-center d-flex align-items-center justify-content-center">
      <div class="container px-3">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card journal-card shadow-lg">
              <div class="card-body p-4">
                <!-- HEADER -->
                <div class="text-center mb-4">
                  <i class="bi bi-pencil-square fs-1 text-warning"></i>
                  <h4 class="mt-2 fw-bold">Chỉnh sửa nhật ký công việc</h4>
                  <p class="text-muted mb-0">
                    Cập nhật thông tin công việc đã ghi nhận
                  </p>
                </div>

                <!-- FORM -->
                <form method="post">
                  {% csrf_token %}

                  <!-- Nội dung công việc -->
                  <div class="mb-3">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-file-text"></i> Nội dung công việc
                    </label>
                    <textarea
                      name="content"
                      rows="4"
                      class="form-control"
                      required
                    >
{{ journal.content }}</textarea
                    >
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-tags"></i> Loại công việc
                    </label>
                    <select
                      name="job_type"
                      id="job_type"
                      class="form-select"
                      required
                    >
                      <option value="{{ journal.job_type }}">
                        {{ journal.job_type }}
                      </option>
                      {% for value, label in job_types %}
                      <option value="{{ value }}">{{ label }}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Nguyên nhân sự cố -->
                  <div
                    class="mb-3 {% if journal.job_type != 'Sự cố' %}d-none{% endif %}"
                    id="incident-reason-wrapper"
                  >
                    <label class="form-label fw-semibold text-danger">
                      <i class="bi bi-exclamation-triangle"></i> Nguyên nhân sự
                      cố
                    </label>
                    <textarea
                      name="incident_reason"
                      rows="3"
                      class="form-control"
                    >
{{ journal.incident_reason }}</textarea
                    >
                  </div>

                  <!-- Tình trạng -->
                  <div class="mb-4">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-info-circle"></i> Tình trạng công việc
                    </label>
                    <select name="status" class="form-select" required>
                      <option value="{{ journal.status }}">
                        {{ journal.status }}
                      </option>
                      <option
                        value="Đang xử lý"
                        {%
                        if
                        journal.status=""
                        ="Đang xử lý"
                        %}selected{%
                        endif
                        %}
                      >
                        🟡 Đang xử lý
                      </option>
                      <option
                        value="Đã hoàn tất"
                        {%
                        if
                        journal.status=""
                        ="Đã hoàn tất"
                        %}selected{%
                        endif
                        %}
                      >
                        🟢 Đã hoàn tất
                      </option>
                    </select>
                  </div>

                  <!-- BUTTON -->
                  <div class="d-grid justify-content-center gap-2">
                    <button
                      type="submit"
                      class="btn btn-warning btn-save rounded-pill shadow"
                    >
                      <i class="bi bi-save"></i> Cập nhật công việc
                    </button>

                    <a
                      href="{% url 'list_journal' %}"
                      class="btn btn-outline-secondary rounded-pill"
                    >
                      <i class="bi bi-arrow-left"></i> Quay lại danh sách
                    </a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      const jobTypeSelect = document.getElementById("job_type");
      const incidentReasonWrapper = document.getElementById(
        "incident-reason-wrapper",
      );
      const incidentReasonTextarea =
        incidentReasonWrapper.querySelector("textarea");

      jobTypeSelect.addEventListener("change", function () {
        if (this.value === "Sự cố") {
          incidentReasonWrapper.classList.remove("d-none");
          incidentReasonTextarea.setAttribute("required", "required");
        } else {
          incidentReasonWrapper.classList.add("d-none");
          incidentReasonTextarea.removeAttribute("required");
          incidentReasonTextarea.value = "";
        }
      });
    </script>
  </body>
</html>
