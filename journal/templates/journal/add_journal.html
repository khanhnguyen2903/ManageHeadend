{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thêm nhật ký công việc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        min-height: 100vh;
      }

      /* Header trên cùng */
      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 12px 16px;
        z-index: 1000;
        color: #fff;
      }

      /* Button xem nhật ký */
      .journal-link-wrapper {
        margin-top: 80px; /* cách top-bar */
        display: flex;
        justify-content: center; /* căn giữa ngang */
      }

      .journal-link-btn {
        background: #ffffff;
        color: #0d6efd;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 999px;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        transition: all 0.25s ease;
      }

      .journal-link-btn:hover {
        background: #e9f0ff;
        color: #084298;
        transform: translateY(-2px);
      }

      .page-center {
        min-height: 100vh;
        padding-top: 10px;
        /* chừa chỗ cho top-bar */
      }

      .journal-card {
        border-radius: 16px;
      }

      .btn-save {
        min-width: 200px;
        font-size: 1.1rem;
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <div class="d-flex justify-content-between align-items-center text-white">
        <!-- Xin chào -->
        <div class="fw-semibold">
          <div>
            <i class="bi bi-person-circle me-1"></i>
            Xin chào, <strong>{{ name }}</strong>
          </div>
          <div>Địa điểm: {{ shift_location }}</div>
          <div>Ca trực: {{ shift_time }}</div>
        </div>

        <!-- Đăng xuất -->
        <a
          href="{% url 'logout_user' %}"
          class="btn btn-outline-light btn-sm rounded-pill"
        >
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-sm-inline">Đăng xuất</span>
        </a>
      </div>
    </div>
    <div class="journal-link-wrapper">
      <a href="{% url 'list_journal' %}" class="journal-link-btn">
        <i class="bi bi-journal-text me-1"></i>
        Xem nhật ký ca trực
      </a>
    </div>

    <div class="page-center d-flex align-items-center justify-content-center">
      <div class="container px-3">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card journal-card shadow-lg">
              <div class="card-body p-4">
                <!-- Header -->
                <div class="text-center mb-4">
                  <i class="bi bi-journal-text fs-1 text-primary"></i>
                  <h4 class="mt-2 fw-bold">Thêm nhật ký công việc</h4>
                  <p class="text-muted mb-0">
                    Ghi nhận và theo dõi công việc headend
                  </p>
                </div>

                <!-- Form -->
                <form method="post">
                  {% csrf_token %}

                  <!-- Nội dung công việc -->
                  <div class="mb-3">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-file-text"></i> Nội dung công việc
                    </label>
                    <textarea
                      name="content"
                      rows="4"
                      class="form-control"
                      placeholder="Mô tả chi tiết sự cố / công việc đã thực hiện..."
                      required
                    ></textarea>
                  </div>

                  <!-- Loại công việc -->
                  <div class="mb-3">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-tags"></i> Loại công việc
                    </label>
                    <select
                      name="job_type"
                      id="job_type"
                      class="form-select"
                      required
                    >
                      <option value="">-- Chọn loại công việc --</option>
                      <option value="Sự cố">🚨 Sự cố</option>
                      <option value="Kiểm tra kênh TH">
                        📺 Kiểm tra kênh TH
                      </option>
                      <option value="Cập nhật bảng kênh">
                        🗂️ Cập nhật bảng kênh
                      </option>
                      <option value="Khác">🔧 Khác</option>
                    </select>
                  </div>

                  <!-- Nguyên nhân sự cố (chỉ hiển thị khi Loại công việc = Sự cố) -->
                  <div class="mb-3 d-none" id="incident-reason-wrapper">
                    <label class="form-label fw-semibold text-danger">
                      <i class="bi bi-exclamation-triangle"></i> Nguyên nhân sự
                      cố
                    </label>
                    <textarea
                      name="incident_reason"
                      rows="3"
                      class="form-control"
                      placeholder="Mô tả nguyên nhân gây ra sự cố..."
                    ></textarea>
                  </div>

                  <!-- Tình trạng công việc -->
                  <div class="mb-4">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-info-circle"></i> Tình trạng công việc
                    </label>
                    <select name="status" class="form-select" required>
                      <option value="Đang xử lý">🟡 Đang xử lý</option>
                      <option value="Đã hoàn tất">🟢 Đã hoàn tất</option>
                    </select>
                  </div>

                  <!-- Button -->
                  <div class="d-grid justify-content-center">
                    <button
                      type="submit"
                      class="btn btn-success btn-save rounded-pill shadow"
                    >
                      <i class="bi bi-save"></i> Lưu công việc
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const jobTypeSelect = document.getElementById("job_type");
      const incidentReasonWrapper = document.getElementById(
        "incident-reason-wrapper",
      );
      const incidentReasonTextarea =
        incidentReasonWrapper.querySelector("textarea");

      jobTypeSelect.addEventListener("change", function () {
        if (this.value === "Sự cố") {
          incidentReasonWrapper.classList.remove("d-none");
          incidentReasonTextarea.setAttribute("required", "required");
        } else {
          incidentReasonWrapper.classList.add("d-none");
          incidentReasonTextarea.removeAttribute("required");
          incidentReasonTextarea.value = "";
        }
      });
    </script>
  </body>
</html>
