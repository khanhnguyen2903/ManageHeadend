{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>NOC Shift Information</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 12px 16px;
        z-index: 1000;
        color: #fff;
      }

      .shift-card {
        border-radius: 18px;
      }

      .btn-confirm {
        min-width: 200px;
        font-size: 1.1rem;
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <div class="d-flex justify-content-between align-items-center text-white">
        <div class="d-flex flex-column align-items-start">
          <!-- Xin chào -->
          <div class="fw-semibold">
            <i class="bi bi-person-circle me-1"></i>
            Xin chào, <strong>{{ name }}</strong>
          </div>

          <!-- Đổi mật khẩu -->
          <a
            href="{% url 'change_password' %}"
            class="btn btn-light btn-sm mt-1 rounded-pill"
          >
            <i class="bi bi-key"></i> Đổi mật khẩu
          </a>
        </div>

        <!-- Đăng xuất -->
        <a
          href="{% url 'logout_user' %}"
          class="btn btn-outline-light btn-sm rounded-pill"
        >
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-sm-inline">Đăng xuất</span>
        </a>
      </div>
    </div>
    <div
      class="d-flex align-items-center justify-content-center min-vh-100 px-3"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-5">
            <div class="card shift-card shadow-lg">
              <div class="card-body p-4">
                <!-- Header -->
                <div class="text-center mb-4">
                  <i class="bi bi-clock-history fs-1 text-primary"></i>
                  <h4 class="fw-bold mt-2">Thông tin ca trực</h4>
                  <p class="text-muted mb-0">
                    Khai báo thông tin ca trực Headend
                  </p>
                </div>

                <!-- Form -->
                <form method="post">
                  {% csrf_token %}

                  <!-- Địa điểm trực -->
                  <div class="mb-3">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-geo-alt"></i> Địa điểm trực
                    </label>
                    <select name="location" class="form-select" required>
                      <option value="">-- Chọn Headend --</option>
                      <option value="Mỹ Đình">📍 Mỹ Đình</option>
                      <option value="Kim Mã">📍 Kim Mã</option>
                    </select>
                  </div>

                  <!-- Ca trực -->
                  <div class="mb-4">
                    <label class="form-label fw-semibold">
                      <i class="bi bi-sun-moon"></i> Ca trực
                    </label>
                    <select name="shift" class="form-select" required>
                      <option value="">-- Chọn ca trực --</option>
                      <option value="Ca sáng">🌅 Ca sáng</option>
                      <option value="Ca tối">🌙 Ca tối</option>
                    </select>
                  </div>

                  <!-- Button -->
                  <div class="d-grid justify-content-center">
                    <button
                      type="submit"
                      class="btn btn-success btn-confirm rounded-pill shadow"
                    >
                      <i class="bi bi-check-circle"></i> Xác nhận
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
