{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Cập nhật nhân viên trực</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            min-height: 100vh;
        }

        .card {
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .btn-update {
            border-radius: 30px;
            padding: 10px 40px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card p-4">
                <div class="card-body">

                    <!-- Tiêu đề -->
                    <h3 class="text-center mb-4 fw-bold text-primary">
                        <i class="bi bi-person-gear"></i> Cập nhật nhân viên trực
                    </h3>

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Tên -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên nhân viên</label>
                            <input type="text" name="name" class="form-control" value="{{ user.full_name }}" required>
                        </div>

                        <!-- Số điện thoại -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="text" name="phone" class="form-control" value="{{ user.phone }}" required>
                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" name="password" class="form-control"
                                placeholder="Nhập mật khẩu mới (nếu đổi)">
                        </div>

                        <!-- Chức vụ -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Chức vụ</label>
                            <select name="role" class="form-select">
                                <option value="staff" {% if user.is_staff %}selected{% endif %}>Nhân viên
                                    trực
                                </option>
                                <option value="leader" {% if not user.is_staff %}selected{% endif %}>Tổ trưởng
                                </option>
                            </select>
                        </div>

                        <!-- Trạng thái -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Trạng thái</label>
                            <select name="status" class="form-select">
                                <option value="Đang hoạt động" {% if user.is_active %}selected{% endif %}>
                                    Đang hoạt động
                                </option>
                                <option value="Ngưng hoạt động" {% if not user.is_active %}selected{% endif %}>
                                    Ngưng hoạt động
                                </option>
                            </select>
                        </div>

                        <!-- Button -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-update">
                                <i class="bi bi-save"></i> Cập nhật
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
