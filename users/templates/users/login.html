{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1d3557, #457b9d);
        }

        .login-card {
            border-radius: 18px;
        }

        .login-icon {
            font-size: 3rem;
            color: #0d6efd;
        }

        .btn-login {
            font-size: 1.1rem;
            padding: 12px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container px-3">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-6 col-lg-4">

                <div class="card login-card shadow-lg">
                    <div class="card-body p-4">

                        <!-- Header -->
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock login-icon"></i>
                            <h4 class="fw-bold mt-2">Đăng nhập hệ thống</h4>
                            <p class="text-muted mb-0">Ứng dụng quản lý Headend</p>
                        </div>

                        <!-- Form -->
                        <form method="post">
                            {% csrf_token %}

                            <!-- Username -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person"></i> Username
                                </label>
                                <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập"
                                    required autofocus>
                            </div>

                            <!-- Password -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-lock"></i> Password
                                </label>
                                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu"
                                    required>
                            </div>

                            <!-- Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-login rounded-pill shadow">
                                    <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
